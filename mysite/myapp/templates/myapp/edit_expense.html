{% extends './base.html' %}

{% block content %}
<div class="max-w-2xl mx-auto mt-10">
    <div class="glass-panel p-8 rounded-2xl relative overflow-hidden">
        <!-- Background decoration -->
        <div class="absolute -right-20 -top-20 w-48 h-48 bg-indigo-600/10 rounded-full blur-[40px] pointer-events-none"></div>
        
        <h3 class="text-2xl font-bold mb-6 text-white flex items-center gap-3">
            <i class="fa-solid fa-pen-to-square text-indigo-400"></i> Edit Expense
        </h3>
        
        <form action="" method="POST" class="space-y-6 relative z-10">
            {% csrf_token %}
            
            <div class="space-y-2">
                <label class="block text-sm font-medium text-gray-300">Name</label>
                {{ expense_form.name }}
            </div>
            <div class="space-y-2">
                <label class="block text-sm font-medium text-gray-300">Amount</label>
                {{ expense_form.amount }}
            </div>
            <div class="space-y-2">
                <label class="block text-sm font-medium text-gray-300">Category</label>
                {{ expense_form.category }}
            </div>
            
            <div class="flex items-center gap-4 pt-4">
                <button type="submit" class="flex-1 bg-gradient-to-r from-indigo-500 to-purple-600 hover:from-indigo-600 hover:to-purple-700 text-white font-medium py-3 px-4 rounded-xl shadow-lg shadow-indigo-500/25 transition-all focus:ring-2 focus:ring-offset-2 focus:ring-offset-gray-900 focus:ring-indigo-500 transform hover:-translate-y-0.5">
                    Update Expense
                </button>
                <a href="{% url 'index' %}" class="flex-1 text-center bg-gray-800 hover:bg-gray-700 text-white font-medium py-3 px-4 rounded-xl border border-white/10 transition-all transform hover:-translate-y-0.5">
                    Cancel
                </a>
            </div>
        </form>
        
        <script>
            document.querySelectorAll('form input, form select').forEach(el => {
                if (el.type !== 'hidden' && el.type !== 'submit') {
                    el.classList.add('w-full', 'bg-white/5', 'border', 'border-white/10', 'rounded-xl', 'px-4', 'py-3', 'text-white', 'focus:outline-none', 'focus:ring-2', 'focus:ring-indigo-500/50', 'transition-all');
                }
            });
        </script>
    </div>
</div>
{% endblock %}
