<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Expense Tracker</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        gray: {
                            750: '#2d3342',
                            850: '#1a202c',
                            950: '#0f172a',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        /* Modern Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(15, 23, 42, 1);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(51, 65, 85, 1);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(71, 85, 105, 1);
        }
    </style>
</head>

<body class="bg-gray-950 text-gray-100 min-h-screen antialiased selection:bg-indigo-500 selection:text-white">

    <!-- Top Navigation -->
    <nav
        class="glass-panel sticky top-0 z-50 px-6 py-4 mb-8 flex items-center justify-between rounded-b-2xl border-t-0 max-w-7xl mx-auto shadow-indigo-900/10">
        <div class="flex items-center gap-3">
            <div
                class="bg-gradient-to-br from-indigo-500 to-purple-600 p-2.5 rounded-xl shadow-lg shadow-indigo-500/30">
                <i class="fa-solid fa-chart-pie text-white text-xl"></i>
            </div>
            <h1 class="text-2xl font-bold tracking-tight text-white">
                Expense<span
                    class="text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-purple-400">Tracker</span>
            </h1>
        </div>
        <div>
            <a href="{% url 'index' %}"
                class="text-sm font-semibold text-gray-300 hover:text-white transition-colors duration-200 bg-white/5 hover:bg-white/10 px-4 py-2 rounded-lg border border-white/5">
                <i class="fa-solid fa-house mr-1.5"></i> Dashboard
            </a>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pb-12">
        {% block content %}
        {% endblock %}
    </main>

</body>

</html>
